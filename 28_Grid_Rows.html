<body>
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Coloumns</title>
    <style>
        .grid{
            display: grid;
            grid-template-columns: 2fr 1fr;
            /* بتحدد عدد الأعمدة وعرض كل عمود. */
            grid-template-rows: 2fr 1fr 5fr;
            /* بتحدد عدد الصفوف وارتفاع كل صف. */
           
         /* لو محددتش الارتفاع بتاع اى row by default القيمه بتاعته هتبقى موجوده هنا */
         /* 
         grid-auto-rows بتحدد ارتفاع الصفوف اللي بيتعملوا تلقائيًا داخل الـ Grid.
يعني لو عندك عناصر أكتر من الصفوف اللي محدداها، الـ Grid هيعمل صفوف جديدة لوحده، وارتفاع كل صف جديد هيبقى 6fr.
6fr معناها 6 أجزاء من المساحة المتاحة.
         */
            grid-auto-rows: 6fr;
            /* column-gap: 10px;
            row-gap: 10px; */
            gap: 10px;
            /* gap:rows coloumns; */






        }
        .box{
            padding: 1.5rem;
            background-color: #eee;
            border: 1px solid #bbb;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="grid">
        <!-- .box{Box $}*4 -->
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
        <div class="box">Box 4</div>
        <div class="box">Box 5</div>
        <div class="box">Box 6</div>
        <div class="box">Box 7</div>
        <div class="box">Box 8</div>
        <div class="box">Box 9</div>
        <div class="box">Box 10</div>


    </div>
</body>
</html>
</body>
</html>
