<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Variables</title>
    <style>
        :root{
            --primary-color:#333;
            --secondary-color:#fff;
            --max-width:700px;
        }
        .container{
            display: flex;
            max-width: var(--max-width);
        }
        .box{
            padding: 10px;
            margin: 10px;
            background-color: var(--primary-color);
            color: var(--secondary-color);
        }
    </style>
</head>
<body>
    <h1>CSS Variables</h1>
        <div class="container">
        <div class="box">
            <h2>Box 1</h2>
            <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit.
                 Totam, dolor.</p>
        </div>


                <div class="box">
            <h2>Box 2</h2>
            <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit.
                 Totam, dolor.</p>
        </div>
    </div>

</body>
</html>
