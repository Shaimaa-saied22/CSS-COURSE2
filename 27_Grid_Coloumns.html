<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Coloumns</title>
    <style>
        .grid{
            display: grid;
            /* grid-template-columns: 100px 100px; */
            /* grid-template-columns: auto auto auto ; */
            /* طيب افرض عندى اكتر من عمود هعملها بخاصيه ال repeat(عدد الاعمده,auto ) */
            /* grid-template-columns: repeat(2,auto); */
            /* grid-template-columns: 1fr 2fr 1fr; */
            grid-template-columns: repeat(3, 1fr);
            /* السطر ده بيتكتب داخل عنصر عامل display: grid;، وبيحدد عرض الأعمدة.

هنا أنتي عاملة عمودين:

العمود الأول 1fr
العمود الثاني 2fr

fr معناها "جزء" من المساحة المتاحة.

يعني المساحة هتتقسم إلى 3 أجزاء:

العمود الأول ياخد جزء واحد
العمود الثاني ياخد جزئين

فبالتالي العمود الثاني هيبقى ضعف عرض العمود الأول. */






        }
        .box{
            padding: 1.5rem;
            background-color: #eee;
            border: 1px solid #bbb;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="grid">
        <!-- .box{Box $}*4 -->
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
        <div class="box">Box 4</div>
        <div class="box">Box 5</div>
        <div class="box">Box 6</div>
        <div class="box">Box 7</div>
        <div class="box">Box 8</div>
        <div class="box">Box 9</div>
        <div class="box">Box 10</div>


    </div>
</body>
</html>
