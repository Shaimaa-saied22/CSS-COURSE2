<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Animation2</title>
    <style>
        body{
            background-color: black;
        }
        div{
            width: 100px;
            height: 100px;
            background-color: red;
            position: relative;
            top: 0;
            left: 0;
            animation: box 5s;


/* animation: box 2s ease-in-out 2 forwards; */
/* @keyframes فيها from / to وفيها persentage دى بترنز لعدد الثوانى */

        }
        @keyframes box{
        0%{
            top: 0;
            left: 0;
        }
        25%{
            top: 0;
            left: 300px;
        }
        50%{
            top: 300px;
            left: 300px;
        }
        75%{
            top: 300px;
            left: 0;
        }
        100%{
            top: 0;
            left: 0;
        }
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
