    <style>
        /* 
        1.px = 16 (default)

        2.em 
        - 1em=font-size of parent element

        3.rem

        4.%

        5.vw=viewport width

        6.vh=viewport height


        */

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .viewport{

            height: 10vh;
        }
        .c{
            border: 5px dashed blue;
            padding: 15px;
            margin: 60px;
            width: 50%;
            position: fixed;
        }
    </style>
</head>
