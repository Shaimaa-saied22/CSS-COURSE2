<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>colors</title>
    <style>
        /* 
        1-clor name
        2-color rgb (red-green-blue)
        3-color hex

        */
        h1{
            color: black;
        }
        h2{
            color: rgb(255, 255, 255);
        }
        h3{
            color: #ccc;
            /* لو عندك حرف متكرر6 مرات بتاخد اول 3 حروف بس  */
            /* 
            #cccccc ده لون رمادى
            #000000 ده لون اسود 
            #ffffff ده لون ابيض 
            فيه موقع خاص با ال hex هو color hex.com
            فيه اكستنشن على فيجوال استوديو كود اسمه color highlight
            */
        }


    </style>
</head>
<body>
    <h1>Heading one</h1>
    <h2>Heading two</h2>
    <h3>Heading three</h3>
</body>
</html>
