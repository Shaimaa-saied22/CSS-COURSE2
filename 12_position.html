<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position</title>
    <style>
        /* 
        position

        1.static=default
        العنصر بيبقى في مكانه الطبيعي في الصفحة (حسب ترتيب الـ HTML).
        -not affected by top & bottom & right & left
        -static = الوضع الافتراضي
        العنصر ثابت في مكانه الطبيعي
        لا يمكنك تحريكه باستخدام top/right/bottom/left


        2.relative 
        ده بياثر على البوكس اللى احنا محددينه بس

        3.absolute 
        -affected by parent 
        -بيتاثر بابوه

        4.fixed
        -حاجه ثابته 

        5.sticky 
        -هسكرول عادى لحد ما نوصلها وبعد كده بتفضل ثابته معانا 
        

        z-index 
        -هو مسؤول عن التحكم فى الطبقات بتاعتنا 
        */

        body{
            height: 3000px;
        }

        .container{
            width: 500px;
            height: 500px;
            background-color: #333;
            position: relative;
        }
        .box-1{
            background-color: cyan;
            width: 100px;
            height: 100px;
            position: static;
        }

        .box-2{
            background-color:black;
            width: 100px;
            height: 100px;
            position: relative;
            top: 30px;
            left: 30px;
            z-index: 1;
        }
        .box-3{
            background-color:green;
            width: 100px;
            height: 100px;
            position: absolute;
            top: 30px;
            left: 30px;
        }
        .box-4{
            background-color:blue;
            width: 100px;
            height: 100px;
            /* position: fixed; */
            top: 20px;
        }
        .box-5{
            background-color:red;
            width: 100px;
            height: 100px;
            position: sticky;
            top: 0;
        }

    </style>
</head>
<body>

    <div class="box-1"></div>
    <div class="box-2"></div>
    <div class="container">
    <div class="box-3"></div>
    </div>
    <div class="box-4"></div>
    <div class="box-5"></div>

</body>
</html>
